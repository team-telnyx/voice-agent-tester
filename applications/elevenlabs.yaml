url: "https://elevenlabs.io/app/talk-to?agent_id={{assistantId}}"
tags:
  - provider
  - elevenlabs
steps:
  - action: wait_for_element
    selector: "text=Call AI agent"
  - action: sleep
    time: 3000
  - action: click
    selector: "text=Call AI agent"
  # ElevenLabs shows a terms consent dialog — click "Agree" to proceed
  - action: wait_for_element
    selector: "text=Agree"
  - action: click
    selector: "text=Agree"
  - action: sleep
    time: 2000
